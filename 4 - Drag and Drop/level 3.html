<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <main>
        <div class="items">

            <div id="drag" draggable="true">
                <h1>HTML</h1>
            </div>
            <div id="drag" draggable="true">
                <h1>CSS</h1>
            </div>
            <div id="drag" draggable="true">
                <h1>JAVASCRIPT</h1>
            </div>
            
        </div>

        <div class="col">
            <h1>Drop here..</h1>
        </div>
    </main>

    <style>
        body {
            background: #000;
        }

        main {
            width:100%;
            height: 97.7vh;
            background: #2d94e9;
            display: flex;
            justify-content: space-evenly;
        }

        #drag {
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            background: crimson;
            cursor: grab;
            transition: left 0.2s ease, top 0.2s ease;
            text-align: center;
            margin: 10px 0;
            
        }

        #drag:nth-child(2) {
            background: #b8b8b8;
        }
        #drag:nth-child(3) {
            background: #59af27;
        }

        .col {
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            height: 70%;
            border: 1px solid #c9042c;
            width: 300px;
            background: #b6b31b;
        }

        .col h1 {
            background: #e6e223;
            padding: 5px;
        }

        
    </style>

    <script>

        let items = document.querySelectorAll("#items");
        const column = document.querySelector(".col");

        items.forEach((item)=> {
            item.addEventListener("dragstart",(e)=> {
                e.dataTransfer.setData("text",e.target.id);
                console.log(e)
            })
        })


        column.addEventListener("dragover",(e)=> {
            e.preventDefault();
        })

        column.addEventListener("drop",(e)=> {
            e.preventDefault();

            let data = e.dataTransfer.getData("text");

            let id = document.getElementById(data);
            
            column.appendChild(id);
        })
    </script>


</body>

</html>
