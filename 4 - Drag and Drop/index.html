<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop</title>

    <style>

        .main {
            width: 90%;
            padding: 10px;
            background: #6a3172;
            user-select: none;
        }

        #box1 {
            background-color: #299672;
            border-radius: 10px;
            width: 200px;
            height: 200px;
            border: none;
            margin: 5px;
            
            cursor: grab;
        }
        
        #box2 {
            background-color: #a0b624;
            border-radius: 10px;
            width: 300px;
            height: 300px;
            border: 2px solid blue;
        }
        
        #box2:hover {
            border: 2px dotted blue;
        }
        
    </style>



</head>
<body bgcolor="#000">
    <div class="main">
        
        <div id="box1" draggable="true" >Move</div>
        <div id="box2">Drop</div>
    </div>

    <script>

        let box1 = document.querySelector("#box1");
        let box2 = document.querySelector("#box2");


        box1.addEventListener("dragstart",(e)=> {
            e.dataTransfer.setData("text",e.target.id);
            // console.log(e.dataTransfer.setData("text",e.target.id))
        })

        box2.addEventListener("dragover",(e)=> {
            e.preventDefault();
        })

        box2.addEventListener("drop",(e)=>{
            e.preventDefault();
            const id = e.dataTransfer.getData("text");
            console.log(id)
            const dropElm = document.getElementById(id);
            box2.appendChild(dropElm);
        })

        
    </script>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div id="tabBar" style="display:flex; gap:5px; padding:10px; background:#eee;">
  <div class="tab" draggable="true" style="padding:5px 10px; background:#3498db; color:white; cursor:grab;">Tab 1</div>
  <div class="tab" draggable="true" style="padding:5px 10px; background:#e74c3c; color:white; cursor:grab;">Tab 2</div>
  <div class="tab" draggable="true" style="padding:5px 10px; background:#2ecc71; color:white; cursor:grab;">Tab 3</div>
</div>


<script>

const tabs = document.querySelectorAll('.tab');
const tabBar = document.getElementById('tabBar');

let draggedTab = null;

// Start dragging
tabs.forEach(tab => {
  tab.addEventListener('dragstart', (e) => {
    draggedTab = tab;
    e.dataTransfer.effectAllowed = "move";
  });

  tab.addEventListener('dragover', (e) => {
    e.preventDefault(); // drop allow
  });

  tab.addEventListener('drop', (e) => {
    e.preventDefault();
    if(draggedTab !== tab) {
      // Swap positions
      const allTabs = Array.from(tabBar.children);
      const draggedIndex = allTabs.indexOf(draggedTab);
      const dropIndex = allTabs.indexOf(tab);
      if(draggedIndex < dropIndex){
        tabBar.insertBefore(draggedTab, tab.nextSibling);
      } else {
        tabBar.insertBefore(draggedTab, tab);
      }
    }
  });
});


</script>
    
</body>
</html>
